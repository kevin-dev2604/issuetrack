spring:
  application:
    name: issuetrack_backend
  profiles:
    default: local
  jpa:
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC     # 저장/처리 UTC
        naming:
          physical-strategy: org.springframework.boot.orm.jpa.hibernate.SpringPhysicalNamingStrategy
          implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy
  jackson:
    time-zone: UTC          # 표시 UTC (글로벌 상대로 제일 무난)
server:
  port: 8080
logging:
  level:
    root: INFO
    com.kevinj.potfolio: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: OFF
    org.hibernate.orm.jdbc.bind: OFF
    org.hibernate.orm.jdbc.extract: OFF
    org.jooq.tools.LoggerListener: OFF
springdoc:
  swagger-ui:
    path: /swagger-ui.html       # Swagger connection address settings
    groups-order: ASC            # Group sort order
    operations-sorter: method    # Sort by HTTP method
    api-docs:
      path: /v3/api-docs           # OpenAPI spec path
    default-consumes-media-type: application/json
    default-produces-media-type: application/json